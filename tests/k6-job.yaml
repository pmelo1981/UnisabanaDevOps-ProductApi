apiVersion: batch/v1
kind: Job
metadata:
  name: k6-stress-test
  namespace: productapi
  labels:
    app: k6-stress-test
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: k6-stress-test
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:0.54.0
          args:
            - run
            - /scripts/stress-test.js
          env:
            - name: TARGET_URL
              value: http://productapi-productapi.productapi.svc.cluster.local
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: k6-stress-test-script
