name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ACR_NAME: productapiacrmpn
  ACR_LOGIN_SERVER: productapiacrmpn.azurecr.io
  IMAGE_NAME: productapi

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Begin SonarQube Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      run: |
        dotnet sonarscanner begin /k:"productapi" /d:sonar.host.url="${{ secrets.SONAR_HOST_URL }}" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.cs.vstest.reportsPaths="**/*.trx"

    - name: Restore dependencies
      run: |
        dotnet restore src/ProductAPI/ProductAPI.csproj
        dotnet restore src/ProductAPI.Tests/ProductAPI.Tests.csproj

    - name: Build
      run: |
        dotnet build src/ProductAPI/ProductAPI.csproj -c Release --no-restore
        dotnet build src/ProductAPI.Tests/ProductAPI.Tests.csproj -c Release --no-restore

    - name: Unit Tests
      run: dotnet test src/ProductAPI.Tests/ProductAPI.Tests.csproj -c Release --no-build --verbosity normal

    - name: End SonarQube Analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    - name: Login to ACR
      if: github.event_name == 'push'
      uses: azure/docker-login@v2
      with:
        login-server: ${{ env.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image
      if: github.event_name == 'push'
      run: |
        IMAGE_TAG="${{ github.sha }}"
        docker build -f docker/Dockerfile -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} .
        docker build -f docker/Dockerfile -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest .
        docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}
        docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

    - name: Update values-acr.yaml and push
      if: github.event_name == 'push'
      run: |
        IMAGE_TAG="${{ github.sha }}"
        sed -i "s|tag: .*|tag: ${IMAGE_TAG}|" helm/values-acr.yaml
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add helm/values-acr.yaml
        git commit -m "ci: update image tag to ${IMAGE_TAG}" || echo "No changes"
        git push
