replicaCount: 2
image:
  repository: productapiacrmpn.azurecr.io/productapi
  tag: e06758f2f744b5b19b2b132f19077ed19f7855d1
  pullPolicy: Always
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
env:
  - name: ASPNETCORE_ENVIRONMENT
    value: Production
ingress:
  enabled: true
  host: "productapi-mpn.centralus.cloudapp.azure.com"
serviceMonitor:
  enabled: true
  interval: 15s
  path: /metrics
  release: prometheus
