replicaCount: 2

image:
  repository: productapi  # Cambiar por: turegistry.azurecr.io/productapi o tuusuario/productapi
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP  # ClusterIP porque el Ingress Controller maneja el acceso externo
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

env:
  - name: ASPNETCORE_ENVIRONMENT
    value: Production

ingress:
  enabled: true
  host: ""  # Dejar vacio para acceso directo por IP
